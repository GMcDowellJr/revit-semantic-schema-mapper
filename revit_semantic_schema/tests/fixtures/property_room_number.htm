<h1 id="PageHeader">Room.Number Property</h1>
<div class="summary">
<p>Gets or sets the room number, backed by BuiltInParameter.ROOM_NUMBER. This is distinct from
the room's Name, which is backed by BuiltInParameter.ROOM_NAME via the inherited Element.Name
property.</p>
</div>
<div class="syntax">
<pre class="typeSignature">public string Number { get; set; }</pre>
</div>
